spring.application.name=wtchat

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:wtchat-super-secret-key-fiap-2025-enterprise-challenge-wtc-security-key-256bits}
jwt.expiration=86400

# ─── Server ───────────────────────────────────────────────────────────────────
# Railway define a variável PORT automaticamente; localmente usa 8081
server.port=${PORT:8081}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.br.com.fiap.wtchat=INFO
logging.level.org.springframework.security=WARN

# ─── Perfil padrão (local com MongoDB embutido) ───────────────────────────────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
