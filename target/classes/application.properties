spring.application.name=wtchat

# ─── MongoDB ──────────────────────────────────────────────────────────────────
# Modo padrão: MongoDB embutido (sem instalação)
# Para usar Atlas, comente a linha abaixo e descomente a do Atlas
de.flapdoodle.mongodb.embedded.version=7.0.2

# MongoDB Atlas (opcional — substitua pela sua connection string)
# spring.data.mongodb.uri=mongodb+srv://<user>:<password>@cluster.mongodb.net/wtchat

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=wtchat-super-secret-key-fiap-2025-enterprise-challenge-wtc-security-key-256bits
jwt.expiration=86400

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8081

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.br.com.fiap.wtchat=DEBUG
logging.level.org.springframework.security=INFO
